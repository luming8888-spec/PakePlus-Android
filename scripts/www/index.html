<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0" />
    <title>ATEM Mini Pro 摄像头切换</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-soft: #1f2937;
            --accent: #22c55e;
            --accent-strong: #16a34a;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(34,197,94,0.15), transparent 30%),
                linear-gradient(180deg, #020617 0%, #030712 100%);
            color: var(--text);
        }

        .container {
            width: min(680px, calc(100% - 24px));
            padding: 24px;
            border-radius: 20px;
            background: rgba(17,24,39,0.88);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            backdrop-filter: blur(4px);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.4;
        }

        .status {
            margin-top: 20px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(31,41,55,0.9);
            border: 1px solid rgba(34,197,94,0.25);
            color: var(--text);
            min-height: 48px;
            display: flex;
            align-items: center;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 18px;
        }

        .switch-btn {
            border: 1px solid rgba(34,197,94,0.35);
            background: linear-gradient(180deg, rgba(34,197,94,0.22), rgba(21,128,61,0.28));
            color: var(--text);
            border-radius: 14px;
            padding: 20px;
            font-size: 1.35rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            box-shadow: 0 10px 30px rgba(34,197,94,0.15);
        }

        .switch-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: rgba(34,197,94,0.75);
            box-shadow: 0 14px 34px rgba(34,197,94,0.22);
        }

        .switch-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .switch-btn:disabled {
            cursor: wait;
            opacity: 0.65;
        }

        .footer {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>ATEM Mini Pro 摄像头切换</h1>
        <p class="subtitle">点击下方按钮切换摄像头，触发对应接口的自动转场。</p>

        <div class="button-grid" id="buttonGrid"></div>

        <div class="status" id="status">等待操作…</div>
        <!-- p class="footer">接口地址：<span id="apiUrl">http://192.168.5.11:8000</span></p -->
    </main>

    <script>
        const API_URL = 'http://192.168.5.11:8000';
        const buttonGrid = document.getElementById('buttonGrid');
        const statusBox = document.getElementById('status');

        function setStatus(message, isError = false) {
            statusBox.textContent = message;
            statusBox.style.borderColor = isError ? 'rgba(248,113,113,0.35)' : 'rgba(34,197,94,0.25)';
            statusBox.style.background = isError ? 'rgba(127,29,29,0.35)' : 'rgba(31,41,55,0.9)';
        }

        async function switchCamera(cameraId) {
            const button = document.querySelector(`[data-camera-id="${cameraId}"]`);
            if (!button) return;

            button.disabled = true;
            setStatus(`正在切换到摄像头 ${cameraId}...`);

            try {
                const response = await fetch(`${API_URL}/switch`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ camera_id: Number(cameraId) })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '切换失败');
                }

                setStatus(`切换成功：${data.selected_source}，自动转场 ${data.transition_time_seconds}s`);
            } catch (error) {
                setStatus(`切换失败：${error.message}`, true);
            } finally {
                button.disabled = false;
            }
        }

        [1,2,3,4].forEach((cameraId) => {
            const button = document.createElement('button');
            button.className = 'switch-btn';
            button.type = 'button';
            button.textContent = String(cameraId);
            button.dataset.cameraId = String(cameraId);
            button.addEventListener('click', () => switchCamera(cameraId));
            buttonGrid.appendChild(button);
        });

        setStatus('就绪，可以开始切换摄像头。');
    </script>
</body>
</html>
